# PCAP Analysis Pipeline Chain
# Chạy: pi chain run chain.yaml --var pcap=<đường_dẫn_pcap>

name: pcap-analysis-pipeline
description: >
  Phân tích PCAP song song (TCP/DNS/SSH) rồi tổng hợp báo cáo bảo mật.

vars:
  pcap: ~/proto-analyzer/data/captures.pcap
  output_dir: ~/proto-analyzer/output

steps:

  # ── Bước 1: Chạy song song 3 analyzer agents ──────────────────────
  - id: parallel-analysis
    type: parallel
    agents:
      - id: tcp
        agent: agents/tcp-agent.md
        prompt: >
          Phân tích TCP streams từ file PCAP: {{pcap}}.
          Lưu kết quả vào {{output_dir}}/tcp.json.
          Báo cáo số stream tìm được khi hoàn tất.

      - id: dns
        agent: agents/dns-agent.md
        prompt: >
          Phân tích DNS flows từ file PCAP: {{pcap}}.
          Lưu kết quả vào {{output_dir}}/dns.json.
          Báo cáo số DNS query tìm được khi hoàn tất.

      - id: ssh
        agent: agents/ssh-agent.md
        prompt: >
          Phân tích SSH sessions từ file PCAP: {{pcap}}.
          Lưu kết quả vào {{output_dir}}/ssh.json.
          Báo cáo số SSH flow và brute force suspects khi hoàn tất.

    # Nếu một agent thất bại: fail_fast dừng tất cả,
    # continue cho phép tiếp tục các agent còn lại
    on_failure: continue

  # ── Bước 2: Kiểm tra output trước khi báo cáo ─────────────────────
  - id: verify-outputs
    type: condition
    check:
      all_exist:
        - "{{output_dir}}/tcp.json"
        - "{{output_dir}}/dns.json"
        - "{{output_dir}}/ssh.json"
    on_false:
      action: stop
      message: >
        Một hoặc nhiều file JSON chưa được tạo.
        Kiểm tra lại log của tcp-agent, dns-agent, ssh-agent.

  # ── Bước 3: Reporter chạy sau khi cả 3 hoàn tất ───────────────────
  - id: security-report
    type: single
    agent: agents/reporter-agent.md
    prompt: >
      Tạo báo cáo bảo mật tổng hợp từ:
      - TCP data: {{output_dir}}/tcp.json
      - DNS data: {{output_dir}}/dns.json
      - SSH data: {{output_dir}}/ssh.json
      Lưu báo cáo vào {{output_dir}}/security_report.md.
      Title: "Báo cáo Phân tích PCAP - {{pcap}}"
    depends_on:
      - parallel-analysis
      - verify-outputs